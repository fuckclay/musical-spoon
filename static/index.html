<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" id="tab-favicon" href="favicon.png" />
    <title id="tab-title">Home</title>
    <link rel="stylesheet" href="/assets/css/global.css?v=2" />
    <link rel="stylesheet" href="/assets/css/home.css" />
    <link rel="stylesheet" href="/assets/css/nav.css" />
    <style>
      body {
        display: none; /* hidden until auth resolves */
      }

      #loginScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        display: none; /* firebase will show this if needed */
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      #siteContent {
        display: none; /* hidden until logged in */
      }

      .login-btn {
        width: 550px;
        height: 60px;
        border-radius: 5px;
        background: var(--background-column);
        color: var(--text-primary);
        font-family: "Poppins", sans-serif;
        font-size: 18px;
        border: none;
        cursor: pointer;
        box-shadow: 0 0 15px 2px rgba(0, 0, 0, 0.2);
        backdrop-filter: var(--backdrop-filter);
        -webkit-backdrop-filter: var(--backdrop-filter);
        transition: 0.4s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-btn:hover {
        background: var(--background-accent);
        box-shadow: 0 0 25px 4px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
      <h1 class="title" style="margin-top: 0;">
        <an>Desmos</an> Login 
      </h1>
      <p style="color: var(--text-dark); font-family: 'Poppins', sans-serif; margin-bottom: 1em; margin-top: -2em;">
        Sign in to continue
      </p>
      <button onclick="googleLogin()" class="login-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="vertical-align: middle; margin-right: 8px;" />
        Sign in with Google
      </button>
    </div>

    <!-- SITE CONTENT -->
    <div id="siteContent">
      <div class="fixed-nav-bar"></div>
      <div id="particles-js">
        <div class="main">
          <h1 class="title"><an>Depression</an> Proxy</h1>
          <p id="splash">Unknown</p>
          <div class="search-container">
            <form id="fs">
              <input
                id="is"
                class="main-search"
                placeholder="Search or enter address"
                type="text"
              />
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/scripts/i.js?V=42"></script>
    <script src="/assets/scripts/h.js?v=22"></script>
    <script src="./assets/-/bundle.js?v=5-5-2024"></script>
    <script src="./assets/-/config.js?v=5-5-2024"></script>
    <script src="https://kit.fontawesome.com/1237c86ba0.js" crossorigin="anonymous"></script>
    <script src="/assets/scripts/m.js?v=82"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBVXqCSyx6TA8Ec9jl7W0vWh0WUuFyxR10",
        authDomain: "macro-entity-416815.firebaseapp.com",
        projectId: "macro-entity-416815",
        storageBucket: "macro-entity-416815.appspot.com",
        messagingSenderId: "89882875543",
        appId: "1:89882875543:web:9f0430e9b87fd2aeaf7bd2"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      window.googleLogin = async () => {
        try {
          await signInWithPopup(auth, provider);
        } catch (e) {
          alert("Login failed: " + e.message);
        }
      };

      onAuthStateChanged(auth, (user) => {
        const login = document.getElementById("loginScreen");
        const site = document.getElementById("siteContent");

        // reveal page now that auth is confirmed
        document.body.style.display = "block";

        if (user) {
          login.style.display = "none";
          site.style.display = "block";
        } else {
          login.style.display = "flex";
          site.style.display = "none";
        }
      });
    </script>
  </body>
</html>
